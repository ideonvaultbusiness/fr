<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Compte en examen — Ideon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpolygon points='32,4 60,32 32,60 4,32' fill='%237c3aed'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <meta property="og:image" content="ideon-banner.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="ideon-banner.png">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
            background: var(--bg);
        }
        .review-container {
            background: rgba(30, 32, 60, 0.32);
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            padding: 48px 32px 40px 32px;
            max-width: 380px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(16px) saturate(160%);
            -webkit-backdrop-filter: blur(16px) saturate(160%);
            border: 1.5px solid rgba(255,255,255,0.13);
            z-index: 1;
        }
        .review-logo {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .review-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .review-desc {
            font-size: 1.05rem;
            margin-bottom: 24px;
            color: #e0e0f5;
        }
        .review-wait {
            font-size: 1.1rem;
            font-weight: 500;
            color: #f59e0b;
        }
        /* Fond hero Ideon */
        .hero-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
        }
        .orb-1 {
            width: 600px;
            height: 600px;
            background: #7c3aed;
            top: -200px;
            right: -200px;
            animation: orbFloat1 15s ease-in-out infinite;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: #06b6d4;
            left: -180px;
            top: 200px;
            animation: orbFloat2 18s ease-in-out infinite;
        }
        .orb-3 {
            width: 400px;
            height: 400px;
            background: #f59e0b;
            left: 50%;
            bottom: -200px;
            transform: translateX(-50%);
            animation: orbFloat3 22s ease-in-out infinite;
        }
        .grid-overlay {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg,rgba(255,255,255,0.02) 0 1px,transparent 1px 100%),repeating-linear-gradient(90deg,rgba(255,255,255,0.02) 0 1px,transparent 1px 100%);
            pointer-events: none;
        }
        @keyframes orbFloat1 {
            0%,100% { transform: none; }
            50% { transform: translateY(40px) scale(1.05); }
        }
        @keyframes orbFloat2 {
            0%,100% { transform: none; }
            50% { transform: translateY(-30px) scale(1.08); }
        }
        @keyframes orbFloat3 {
            0%,100% { transform: none; }
            50% { transform: translate(-50%, 30px) scale(0.97); }
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat linear infinite;
        }
        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="hero-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>
    <div class="particles" id="particles"></div>
    <div class="review-container">
        <div class="review-logo"><span class="review-logo-icon"></span>Ideon</div>
        <div class="review-title">Votre compte a été mis en examen</div>
        <div class="review-desc">Pour des raisons de sécurité, l'accès à votre compte est temporairement suspendu.<br>Merci de patienter pendant la vérification.</div>
        <div class="review-wait">Veuillez patienter 48h.</div>
    </div>
    <script>
    // Particules animées (même logique que sur index.html)
    const particlesContainer = document.getElementById('particles');
    if (particlesContainer) {
        const particleCount = 20;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 3 + 1;
            const colors = ['#7c3aed', '#06b6d4', '#10b981', '#a78bfa'];
            particle.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                left: ${Math.random() * 100}%;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                animation-duration: ${Math.random() * 15 + 10}s;
                animation-delay: ${Math.random() * 10}s;
            `;
            particlesContainer.appendChild(particle);
        }
    }
    </script>
</body>
</html>
